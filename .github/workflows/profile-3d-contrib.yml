name: Generate Profile SVG

permissions:
  contents: write

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC = 03:00 Atlantic/Madeira (UTC+0 / UTC+1 summer)
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/generate-svg.js"
      - ".github/workflows/profile-3d-contrib.yml"

jobs:
  build:
    name: Generate SVG
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: erikkopcha
        run: node scripts/generate-svg.js

      - name: Push SVG to output-3d-contrib branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SVG="profile-3d-contrib/profile-cyan.svg"

          # Save generated file
          TMPFILE=$(mktemp)
          cp "$SVG" "$TMPFILE"

          # Switch to (or create) output branch
          git fetch origin output-3d-contrib 2>/dev/null \
            && git checkout output-3d-contrib \
            || git checkout --orphan output-3d-contrib

          # Wipe everything, put only the SVG
          git rm -rf . --quiet 2>/dev/null || true
          mkdir -p profile-3d-contrib
          cp "$TMPFILE" "$SVG"

          git add "$SVG"
          git diff --cached --quiet && echo "SVG unchanged, skipping commit" && exit 0
          git commit -m "update: profile svg [skip ci]"
          git push origin output-3d-contrib --force
